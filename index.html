<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LKMO - 종합 한글 모스부호 학습기</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/script.js" defer></script>
</head>
<body>

<div class="container">
    <div style="display: grid; grid-template-columns: 1fr auto 1fr; align-items: end; border-bottom: 2px solid #000; padding-bottom: 10px;">
        <div></div>
        <h1 style="margin: 0; text-align: center;">LKMO</h1>
        <h3 id="leaderboardopen" style="margin: 0; text-align: right; cursor: pointer;">[LEADERBOARD]</h3>
    </div>

    <div class="controls">
        <!-- 새로운 기능: 훈련 모드 선택 -->
        <div class="mode-selector">
            <strong>훈련 모드:</strong>
            <label><input type="radio" name="mode" value="koch" checked> 코흐 레슨</label>
            <label><input type="radio" name="mode" value="word"> 단어 연습</label>
            <label><input type="radio" name="mode" value="sentence"> 문장 연습</label>
        </div>

        <div class="control-group" id="lessonGroup">
            <label>레슨 (Koch Level)</label>
            <select id="lessonSelect">
                <script>
                    const levels = ["ㅏ, ㅓ","ㄱ","ㄴ","ㅗ","ㅜ","ㄷ","ㄹ","ㅣ","ㅡ","ㅁ","ㅂ","ㅅ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ","ㅑ","ㅕ","ㅛ","ㅠ","ㅐ","ㅔ"];
                    levels.forEach((chars, i) => {
                        document.write(`<option value="${i+1}">L${i+1}: ${i===0?'':' + '}${chars}</option>`);
                    });
                </script>
            </select>
        </div>
        <div class="control-group">
            <label>훈련 분량 (시간/개수)</label>
            <select id="timeInput">
                <option value="1">1분 / 문장 1개</option>
                <option value="2">2분 / 문장 2개</option>
                <option value="3">3분 / 문장 3개</option>
            </select>
        </div>
    </div>

    <div class="settings-panel">
        <div><label>Speed (WPM)</label><input type="range" id="charWpmInput" value="25" min="10" max="50"> <span id="charWpmLabel">25</span></div>
        <div><label>Eff. Speed (WPM)</label><input type="range" id="effWpmInput" value="15" min="5" max="50"> <span id="effWpmLabel">15</span></div>
        <div><label>Freq (Hz)</label><input type="range" id="freqInput" value="650" min="400" max="1000"> <span id="freqLabel">650</span></div>
        <div><label>Volume (%)</label><input type="range" id="volInput" value="100" min="0" max="100"> <span id="volLabel">100</span></div>
    </div>

    <button id="startBtn">연습 시작</button>
    <!-- 사용자가 한글 완성형으로 치든, 자모로 치든 모두 정답 처리되도록 설명 추가 -->
    <textarea id="userInput" placeholder="소리를 듣고 입력하세요." disabled></textarea>
    <button id="checkBtn" disabled style="margin-top: 10px;">결과 확인</button>

    <div class="status-bar" style="margin-top:20px; display: flex; justify-content: space-between; font-weight: bold;">
        <span id="statusText">대기 중...</span> <span id="scoreText">정답률: -%</span>
    </div>
</div>

    <dialog id="leaderboardDialog">
        <div class="dialog-header">
            <h2>리더보드 (Leaderboard)</h2>
            <button id="leaderboardClose" class="close-btn">&times;</button>
        </div>
        <div class="dialog-content">
            <table id="leaderboardTable">
                <thead>
                    <tr>
                        <th>이름</th>
                        <th>날짜</th>
                        <th>모드</th>
                        <th>정답률</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <!-- Leaderboard entries will go here -->
                </tbody>
            </table>
        </div>
    </dialog>

</body>
</html>
